<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirts</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.19.1/babel.min.js"></script>

  <style>
    .tshirt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 30px;
      row-gap: 40px;
      padding: 20px;
    }

    .tshirt-card {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .tshirt-card img {
      width: 100%;
      object-fit: cover;
    }

    .out-of-stock {
      color: red;
    }

    .price{
      font-weight: bold;
      font-style: italic;
    }

    .quantity {
      display: flex;
      gap: 15px;
    }

    .quantity select {
      padding: 0 12px;
      border-radius: 4px;
      width: 120px;
    }

    .quantity button {
      padding: 8px 16px;
      color: white;
      background-color: #6c757d;
      border: none;
      border-radius: 4px;
    }

    .tshirt-card > div {
      margin-top: auto;
    }
  </style>
</head>
<body>
    <div id="root"></div>
    
    <script src="t-shirts.js"></script>
    <script type="text/babel">
      function Tshirt (props) {
        const shirt = props.shirt
        
        const [quantity, setQuantity] = React.useState(1)

        function clickHandler () {
          props.onUpdateStock(shirt, quantity)
          setQuantity(1)
        }

        function quantityHandler (e) {
          setQuantity(Number(e.target.value))
        }

        const options = []
        for (let i = 1; i <= shirt.stock; i++) {
          options.push(i)
        }

        return (
          <div className="tshirt-card">
            <img src={"images/" + shirt.image} alt={shirt.title} />
            <h3>{shirt.title}</h3>
            <p className="price">$ {shirt.price.toFixed(2)}</p>

            {shirt.stock === 0 ? (
              <p className="out-of-stock">Out of Stock</p>
            ) : (
              <div>
                <p>{shirt.stock} left!</p>
                <div className="quantity">
                  <select value={quantity} onChange={quantityHandler}>
                    {options.map(num => (
                      <option key={num} value={num}>{num}</option>
                    ))}
                  </select>
                  <button onClick={clickHandler}>Buy</button>
                </div>
              </div>
            )}
          </div>
        )
      }

      function App () {
        const [items, setItems] = React.useState(tshirts)

        function onUpdateStockHandler (shirt, selectedQty) {
          setItems((prevState) => 
            prevState.map(s => s.title === shirt.title ? { ...s, stock: s.stock - selectedQty } : s))
        }

        return (
          <>
            <h1 className="mt-4 px-4">T-Shirts</h1>
            <div className="tshirt-grid">
              {items.map(shirt => (
                <Tshirt key={shirt.title} shirt={shirt} onUpdateStock={onUpdateStockHandler} />
              ))}
            </div>
          </>
        )
      }

      const root = ReactDOM.createRoot(document.getElementById('root'))
      root.render(<App />)
    </script>
</body>
</html>
